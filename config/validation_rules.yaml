validation_parameters:
  max_payload_size_bytes: 1048576  # 1MB Hard Boundary Constraint
  allowed_clock_drift_future_sec: 5.0
  allowed_clock_drift_past_sec: 86400.0  # 24 Hours Deadband for Buffering
  duplicate_detection_window_sec: 60.0
  duplicate_cache_max_elements: 50000

quality_rules:
  critical_temperature_upper_bound: 150.0
  critical_pressure_upper_bound: 250.0
  critical_current_upper_bound: 120.0
  invalid_vibration_g_limit: 15.0
