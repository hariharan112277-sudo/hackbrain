# =============================================================================
# IOB Data Engine — Stage 1 Configuration
# Industrial Device Simulator + MQTT Ingestion + PostgreSQL Repository
# Owner: Member 2
# =============================================================================

version: "1.0"

broker:
  host: "localhost"
  port: 1883
  keepalive: 60
  client_id: "iob_simulator_engine"

# Optional broker credentials (uncomment and set when Mosquitto is secured)
# broker:
#   host: "localhost"
#   port: 1883
#   keepalive: 60
#   client_id: "iob_simulator_engine"
#   username: "iob_user"
#   password: "iob_pass"

# ---------------------------------------------------------------------------
# Industrial Devices
# Each device has a UNS-aligned topic: iob/uns/<site>/<area>/<device_id>/telemetry
# ---------------------------------------------------------------------------
devices:

  # ---- Discrete Manufacturing: 5-Axis CNC ------------------------------
  - id: "DEV_CNC_001"
    name: "5-Axis CNC Milling Machine"
    type: "discrete"
    topic: "iob/uns/site_alpha/area_machining/cnc001/telemetry"
    update_interval_secs: 1.0
    metrics:
      - name: "spindle_speed_rpm"
        data_type: "float"
        min_val: 0.0
        max_val: 12000.0
        noise_amplitude: 50.0
      - name: "vibration_amplitude_g"
        data_type: "float"
        min_val: 0.1
        max_val: 4.5
        noise_amplitude: 0.2
      - name: "tool_temperature_c"
        data_type: "float"
        min_val: 20.0
        max_val: 90.0
        noise_amplitude: 1.5

  # ---- Batch Manufacturing: Chemical Reactor ---------------------------
  - id: "DEV_RE_002"
    name: "Chemical Batch Reactor"
    type: "batch"
    topic: "iob/uns/site_alpha/area_process/reactor002/telemetry"
    update_interval_secs: 2.0
    metrics:
      - name: "internal_pressure_bar"
        data_type: "float"
        min_val: 1.0
        max_val: 15.0
        noise_amplitude: 0.1
      - name: "reactor_temperature_c"
        data_type: "float"
        min_val: 25.0
        max_val: 180.0
        noise_amplitude: 0.5
      - name: "agitator_rpm"
        data_type: "float"
        min_val: 50.0
        max_val: 400.0
        noise_amplitude: 4.0

  # ---- Continuous Manufacturing: Hydraulic Press -----------------------
  - id: "DEV_HP_003"
    name: "Hydraulic Press (Continuous)"
    type: "continuous"
    topic: "iob/uns/site_alpha/area_forming/press003/telemetry"
    update_interval_secs: 0.5
    metrics:
      - name: "ram_force_kn"
        data_type: "float"
        min_val: 100.0
        max_val: 5000.0
        noise_amplitude: 25.0
      - name: "hydraulic_pressure_bar"
        data_type: "float"
        min_val: 50.0
        max_val: 350.0
        noise_amplitude: 2.5

# ---------------------------------------------------------------------------
# Database (consumed by main_stage1.py and the repository layer)
# ---------------------------------------------------------------------------
database:
  dbname: "iob_db"
  user: "postgres"
  password: "postgres"
  host: "localhost"
  port: 5432
