# Mosquitto config for local docker-compose development.
# Mosquitto 2.x refuses anonymous connections by default; this stack has no
# separate MQTT auth story yet, so anonymous is explicitly allowed here.
# NEVER use this config as-is in production — set MQTT_USERNAME/MQTT_PASSWORD
# and a real ACL/password file instead (see app/core/config.py Settings).
listener 1883
allow_anonymous true
persistence false
