openapi: 3.1.0
info:
  title: Industrial Operating Brain - Phase 2 Backend Contracts
  version: 1.1.0
  description: Contract-only OpenAPI design. No route implementation is included in Phase 2.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 128
        pattern: '^[A-Za-z0-9_.:\\-]+$'
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 16
        maxLength: 128
  schemas:
    TokenObtainRequest:
      type: object
      required: [username, password, client_id]
      properties:
        username: { type: string, format: email }
        password: { type: string, minLength: 12, maxLength: 128 }
        client_id: { type: string, minLength: 3, maxLength: 64 }
    TokenResponse:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer, minimum: 1 }
    ValidationErrorDetails:
      type: object
      required: [field, message]
      properties:
        field: { type: string }
        message: { type: string }
        rejected_value: { type: string, nullable: true }
    ProblemDetails:
      type: object
      required: [title, status, detail, correlation_id, error_code, retryable]
      properties:
        type: { type: string, default: about:blank }
        title: { type: string }
        status: { type: integer, minimum: 400, maximum: 599 }
        detail: { type: string }
        instance: { type: string, nullable: true }
        correlation_id: { type: string }
        error_code: { type: string }
        retryable: { type: boolean }
        invalid_params:
          type: array
          items: { $ref: '#/components/schemas/ValidationErrorDetails' }
    TelemetryQuality:
      type: string
      enum: [GOOD, UNCERTAIN, BAD]
    HistoricalQueryRequest:
      type: object
      required: [machine_uuid, sensor_uuids, start_time, end_time]
      properties:
        machine_uuid: { type: string, format: uuid }
        sensor_uuids:
          type: array
          minItems: 1
          maxItems: 100
          items: { type: string, format: uuid }
        start_time: { type: string, format: date-time }
        end_time: { type: string, format: date-time }
        aggregation_resolution: { type: string, enum: [1s, 10s, 1m, 5m, 1h], default: 1m }
        pagination:
          type: object
          properties:
            page: { type: integer, minimum: 1, default: 1 }
            limit: { type: integer, minimum: 1, maximum: 1000, default: 50 }
    MetricDataPoint:
      type: object
      required: [timestamp, values]
      properties:
        timestamp: { type: string, format: date-time }
        edge_timestamp: { type: string, format: date-time, nullable: true }
        ingest_timestamp: { type: string, format: date-time, nullable: true }
        values:
          type: object
          additionalProperties:
            oneOf:
              - { type: number }
              - { type: integer }
              - { type: string }
              - { type: boolean }
    HistoricalQueryResponse:
      type: object
      required: [machine_uuid, data_points, total_records, execution_time_ms]
      properties:
        machine_uuid: { type: string, format: uuid }
        data_points:
          type: array
          items: { $ref: '#/components/schemas/MetricDataPoint' }
        total_records: { type: integer, minimum: 0 }
        execution_time_ms: { type: integer, minimum: 0 }
    TelemetryPointResponse:
      type: object
      required: [timestamp, machine_id, sensor_id, metric_name, value, unit, quality, sequence_number]
      properties:
        timestamp: { type: string, format: date-time }
        edge_timestamp: { type: string, format: date-time, nullable: true }
        ingest_timestamp: { type: string, format: date-time, nullable: true }
        machine_id: { type: string, format: uuid }
        sensor_id: { type: string, format: uuid }
        metric_name: { type: string }
        value: { type: number }
        unit: { type: string }
        quality: { $ref: '#/components/schemas/TelemetryQuality' }
        sequence_number: { type: integer, minimum: 0 }
        metadata: { type: object }
    HealthCheckResponse:
      type: object
      required: [status, version, environment, dependencies]
      properties:
        status: { type: string, enum: [HEALTHY, UNHEALTHY] }
        version: { type: string }
        environment: { type: string }
        dependencies: { type: object }
paths:
  /auth/token:
    post:
      summary: Obtain access and refresh tokens
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TokenObtainRequest' }
      responses:
        '200':
          description: Token pair issued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '422':
          description: Contract validation failed
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }
  /historical/query:
    post:
      summary: Query historical telemetry by machine and sensor list
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HistoricalQueryRequest' }
      responses:
        '200':
          description: Historical points returned
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HistoricalQueryResponse' }
        '422':
          description: Contract validation failed
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }
  /iob/telemetry/live:
    get:
      summary: WebSocket upgrade endpoint for live telemetry stream
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '101': { description: Switching Protocols }
        '400': { description: Invalid subscription contract }
  /healthz:
    get:
      summary: Health check
      security: []
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthCheckResponse' }
