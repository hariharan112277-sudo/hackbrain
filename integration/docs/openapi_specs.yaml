openapi: "3.0.3"
info:
  title: "Industrial Operating Brain (IOB) - Core Industrial Service Integration Interface"
  version: "1.0.0"
paths:
  /api/v1/industrial/machines/{machine_id}:
    get:
      summary: "Fetch Detailed Machine Registry Payload Matrix"
      description: "Returns structural asset identity data, telemetry limits, and communication configuration profiles for a target entity node."
      parameters:
        - name: "machine_id"
          in: "path"
          required: true
          schema:
            type: "string"
            format: "uuid"
      responses:
        200:
          description: "Successful registry verification match dispatch."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  id: { type: "string", format: "uuid", example: "182bcfb2-4d1a-4da2-9b24-9dfc120fb211" }
                  asset_id: { type: "string", format: "uuid" }
                  gateway_id: { type: "string", format: "uuid" }
                  firmware_version: { type: "string", example: "v4.12.0-build99" }
                  operating_hours: { type: "number", example: 1245.8 }
                  runtime_counter: { type: "number", example: 450.2 }
                  current_mode: { type: "string", example: "AUTOMATIC" }
                  status: { type: "string", example: "ONLINE" }
                  capabilities: { type: "array", items: { type: "string" }, example: ["HIGH_SPEED_MILLING"] }
                  health_score: { type: "number", example: 94.6 }
        404:
          description: "Target primary search tracking criteria ID is missing from structural registries."
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  error_code: { type: "string", example: "RESOURCE_NOT_FOUND" }
                  message: { type: "string", example: "Machine reference identifier ... does not exist inside registry databases." }

  /api/v1/industrial/sensors/{sensor_id}/telemetry/history:
    post:
      summary: "Query Historical Telemetry Time Series Window Matrix"
      description: "Extracts an ordered array of high-frequency historical sensor data records matching chronological filter boundaries."
      parameters:
        - name: "sensor_id"
          in: "path"
          required: true
          schema:
            type: "string"
            format: "uuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              required: ["start_time", "end_time"]
              properties:
                start_time: { type: "string", format: "date-time", example: "2026-07-03T00:00:00Z" }
                end_time: { type: "string", format: "date-time", example: "2026-07-03T12:00:00Z" }
                page: { type: "integer", default: 1 }
                limit: { type: "integer", default: 100 }
      responses:
        200:
          description: "Chronological telemetry extraction dataset generated successfully."
          content:
            application/json:
              schema:
                type: "array"
                items:
                  type: "object"
                  properties:
                    id: { type: "string", format: "uuid" }
                    timestamp: { type: "string", format: "date-time" }
                    measured_value: { type: "number", example: 24.51 }
                    quality_code: { type: "integer", example: 192 }
        400:
          description: "The time range criteria boundaries are invalid (e.g., start_time >= end_time)."
