version: '3.8'

services:
  api_service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=local
      - LOG_LEVEL=DEBUG
      - JSON_LOGS=false
      - SECRET_KEY=DEVELOPMENT_ONLY_SECRET_PLEASE_REPLACE_IN_PRODUCTION
      - USE_STUB_REPOSITORIES=false
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/iob
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=1883
      - IOB_MQTT_URL=mqtt://mosquitto:1883
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - postgres
      - mosquitto
      - redis
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          memory: 512M

  ai_service:
    image: python:3.12-slim
    container_name: iob_ai_service
    environment:
      - ENVIRONMENT=local
      - LOG_LEVEL=DEBUG
      - AI_SERVICE_URL=http://ai_service:8001
    ports:
      - "8001:8001"
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
        reservations:
          memory: 1G
    volumes:
      - .:/app
    command: ["python", "-m", "http.server", "8001"]
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: iob_redis
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=iob
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/iob_core_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/seed_users.sql:/docker-entrypoint-initdb.d/02_seed_users.sql:ro
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          memory: 64M

volumes:
  pgdata:
  redis_data: