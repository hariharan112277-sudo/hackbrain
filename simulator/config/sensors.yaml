# IOB Phase 3 - Sensor Templates
# Keyed by machine type. Each template is instantiated once per machine of
# that type. Ranges, units and failure probabilities are per the OT emulation
# requirements.
sensor_templates:

  ASSEMBLY_ROBOT:
    - sensor_sub_id: "WRI05_TE01"
      name: "Axis 5 Wrist Temperature"
      type: "TEMPERATURE"
      min_range: 20.0
      max_range: 120.0
      unit: "CELSIUS"
      frequency_hz: 1.0
      noise_variance: 0.5
      failure_probability: 0.001

    - sensor_sub_id: "MTR01_CUR01"
      name: "Servo Motor Current"
      type: "CURRENT"
      min_range: 0.0
      max_range: 50.0
      unit: "AMP"
      frequency_hz: 5.0
      noise_variance: 0.2
      failure_probability: 0.0005

  CNC_MILL:
    - sensor_sub_id: "SPD01_RPM01"
      name: "Spindle Speed"
      type: "SPEED"
      min_range: 0.0
      max_range: 24000.0
      unit: "RPM"
      frequency_hz: 2.0
      noise_variance: 15.0
      failure_probability: 0.001

  # Demonstrates declarative scalability (spec 7.2): a new machine profile is
  # brought online by adding its sensor template here - no engine code changes.
  INDUSTRIAL_PUMP:
    - sensor_sub_id: "BRG01_TE01"
      name: "Bearing Temperature"
      type: "TEMPERATURE"
      min_range: 20.0
      max_range: 130.0
      unit: "CELSIUS"
      frequency_hz: 0.5
      noise_variance: 0.4
      failure_probability: 0.001

    - sensor_sub_id: "VIB02_VM01"
      name: "Pump Casing Vibration"
      type: "VIBRATION"
      min_range: 0.0
      max_range: 25.0
      unit: "MM/S"
      frequency_hz: 4.0
      noise_variance: 0.3
      failure_probability: 0.002
