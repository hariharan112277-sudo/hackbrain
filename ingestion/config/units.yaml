unit_normalization_matrix:
  TEMPERATURE:
    source_units:
      FAHRENHEIT: "CELSIUS"
      KELVIN: "CELSIUS"
    conversions:
      FAHRENHEIT: "lambda x: (x - 32) * 5.0 / 9.0"
      KELVIN: "lambda x: x - 273.15"
    target_unit: "CELSIUS"
    output_precision: 2

  PRESSURE:
    source_units:
      PSI: "BAR"
      KPA: "BAR"
    conversions:
      PSI: "lambda x: x * 0.0689476"
      KPA: "lambda x: x / 100.0"
    target_unit: "BAR"
    output_precision: 3
